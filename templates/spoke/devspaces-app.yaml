{{- /*
  devspaces-app.yaml — Argo CD Application for Red Hat DevSpaces
  Spoke clusters only: skipped on the hub (hub does not run developer workspaces).
  Enabled via platform.argocdApps.devspacesConfig.enabled in platform-config.
  The operator itself is installed by operator-installer (sync-wave "0"); this chart
  deploys the CheCluster CR at sync-wave "1" once the operator is ready.
*/ -}}
{{- if and (ne .Values.clusterType "management") ((((.Values.platform).argocdApps).devspacesConfig).enabled | default false) }}
{{- $appConfig := ((.Values.platform).argocdApps).devspacesConfig }}
{{- $vars := dict -}}
{{- include "default.variables" (dict "vars" $vars "appConfig" $appConfig "Values" .Values) }}
{{- $repoURL        := default "https://github.com/nu-j/helm-catalog.git" $vars.repoURL -}}
{{- $path           := default "devspaces" $vars.path -}}
{{- $targetRevision := default "main" $vars.targetRevision -}}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devspaces-config
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    platform/chart: devspaces
    platform/version: {{ $vars.platformVersion }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: {{ $vars.destinationNamespace }}
    server: https://kubernetes.default.svc
  project: default
  info:
    - name: "Chart repo URL"
      value: "https://github.com/nu-j/helm-catalog.git"
  sources:
    - helm:
        valueFiles:
          {{- include "default.valueFiles" (dict "vars" $vars) | nindent 10 }}
        {{- if $appConfig.values }}
        valuesObject: {{ $appConfig.values | toYaml | nindent 10 }}
        {{- end }}
        ignoreMissingValueFiles: true
      path: {{ $path }}
      repoURL: {{ $repoURL }}
      targetRevision: {{ $targetRevision }}
    - path: .
      ref: platform_values
      repoURL: https://github.com/nu-j/platform-config.git
      targetRevision: {{ $vars.platformVersion }}
{{- if $vars.customSyncPolicy }}
  syncPolicy: {{ $vars.customSyncPolicy | toYaml | nindent 4 }}
{{- else if $vars.platformSyncPolicy }}
  syncPolicy: {{ $vars.platformSyncPolicy | toYaml | nindent 4 }}
{{- else }}
  syncPolicy: {}
{{- end }}
{{- end }}
